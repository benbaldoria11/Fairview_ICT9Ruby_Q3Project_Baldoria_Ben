<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: 'Raleway', sans-serif;
    position: relative;
    overflow-x: hidden;
    background-image: url('https://i.pinimg.com/736x/cd/42/72/cd42724c88a06428e915be9ef1d7153c.jpg');

    background-repeat:no-repeat;
    background-size:cover;
}

.navbar {
    background: rgba(20, 40, 70, 0.6);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 0 8px rgba(30, 146, 255, 0.4),
        0 0 20px rgba(30, 109, 255, 0.5);
}

.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 20px;
    transition: 0.3s ease;
}

.nav-logo:hover {
    transform: scale(1.1);

    box-shadow:
        0 0 10px rgba(30,139,255,0.9),
        0 0 25px rgba(30,139,255,0.7);
}

.nav-left {
    display: flex;
    align-items: center;
}

.nav-left a {
    margin-right: 18px;
    text-decoration: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    transition: 0.3s ease;
}

.nav-left a:hover {
    background: rgba(30,206,255,0.2);
    transform: scale(1.08);

    border: 1px solid #1ea5ff;

    box-shadow:
        0 0 8px rgba(30, 146, 255, 0.6),
        0 0 20px rgba(30, 109, 255, 0.8);
}

.nav-center {
    justify-self: center;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    color: white;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-self: end;
}

.nav-right a {
    color: white;
    text-decoration: none;
    transition: 0.3s ease;
}
.footer {
    background: linear-gradient(
        to top,
        rgba(20, 40, 70, 0.95),
        rgba(20, 40, 70, 0.75)
    );
    backdrop-filter: blur(15px);
    padding: 15px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 -5px 15px rgba(30, 128, 255, 0.6),
        0 -10px 30px rgba(30, 146, 255, 0.4);
    color: white;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.book-now:hover {
    text-shadow:
        0 0 8px rgba(30,139,255,0.9),
        0 0 15px rgba(30,139,255,0.8);
}

.nav-right .create-navbar {
    padding: 8px 14px;
    background: linear-gradient(135deg, #71b5f4, #64c6ff);
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s ease;
}

.nav-right .create-navbar:hover {
    transform: scale(1.08);

    box-shadow:
        0 0 10px rgba(30,139,255,0.9),
        0 0 25px rgba(30,139,255,0.7);
}

.confirm-container {
    width: 800px;
    max-width: 95%;
    margin: 120px auto;
    padding: 40px;
    background: rgba(20,40,70,0.4);
    backdrop-filter: blur(20px);
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 0 15px rgba(30,128,255,0.8),
        0 0 40px rgba(30,146,255,0.9);
    text-align: center;
}

.confirm-container h2 {
    color: white;
    font-size: 35px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.confirm-container p {
    color: #f1f1f1;
    font-size: 18px;
    line-height: 1.8;
    margin-top: 15px;
    text-shadow: 0 0 6px rgba(255,255,255,0.3);
}

.home-btn {
    margin-top: 25px;
    padding: 10px 20px;
    background: #71b5f4;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    color: #0f3f75;
    transition: 0.3s ease;
}

.home-btn:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 10px #488db5,
        0 0 30px rgba(19,95,167,0.7);
}

.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: linear-gradient(
        to top,
        rgba(20,40,70,0.95),
        rgba(20,40,70,0.75)
    );
    backdrop-filter: blur(15px);
    padding: 15px;
    text-align: center;
    color: white;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.quote-box {
    margin-top: 20px;
    padding: 18px 22px;
    background: rgba(255, 255, 255, 0.12);
    border-left: 6px solid #70a6d8;
    border-radius: 10px;
    font-size: 17px;
    color: #ffffff;
    font-style: italic;
    line-height: 1.6;
    text-shadow: 0 0 6px rgba(255,255,255,0.3);
    box-shadow: 0 0 12px rgba(30,128,255,0.5);
}

</style>
</head>

<body>

    <div class="navbar">
        <div class="nav-left">
    
            <a href="home.html">Home</a>
            <a href="farematrix.html">Fare Matrix</a>
        </div>
    
        <div class="nav-center">
            RintarouFare PH
        </div>
    
        <div class="nav-right">
            <a href="registration.html" class="create-navbar">Create Account</a>
        </div>
    </div>

    <br>

<div class="confirm-container">

<h2>🎉 Your Booking is Confirmed!</h2>
<p class="mt-3">
    Your train ticket has been successfully processed.
    </p>
    
    <div class="quote-box">
        “Please proceed to the station and present your booking if required.”
    </div>

<button class="home-btn" onclick="goHome()">
Return to Home
</button>

</div>

<div class="footer">
<p>Ben Baldoria | 9 - Ruby 2026</p>
</div>

<script>

function goHome() {
    window.location.href = "index.html";
}

</script>

</body>
</html>
