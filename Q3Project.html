<style>

body {

.navbar {

}

.nav-logo {

}

}

.nav-left {

}

.nav-left a {

    transition: 0.3s ease;
}

.nav-left a:hover {
    background: rgba(30,206,255,0.2);
    transform: scale(1.08);

}

.nav-center {
    justify-self: center;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    color: white;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-self: end;
}

.nav-right a {
    color: white;
    text-decoration: none;
    transition: 0.3s ease;
}
.footer {

        to top,
        rgba(20, 40, 70, 0.95),

    backdrop-filter: blur(15px);

    display: flex;

    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.2);

        0 -5px 15px rgba(30, 128, 255, 0.6),
        0 -10px 30px rgba(30, 146, 255, 0.4);
    color: white;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.book-now:hover {
    text-shadow:
        0 0 8px rgba(30,139,255,0.9),
        0 0 15px rgba(30,139,255,0.8);
}

.nav-right .create-navbar {
    padding: 8px 14px;
    background: linear-gradient(135deg, #71b5f4, #64c6ff);
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s ease;
}

.nav-right .create-navbar:hover {
    transform: scale(1.08);

    box-shadow:
        0 0 10px rgba(30,139,255,0.9),
        0 0 25px rgba(30,139,255,0.7);
}

.futuristic-box, #box {
    border-radius: 20px;
    background: rgba(20,40,70,0.4);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(0, 240, 255, 0.4);
    box-shadow:
        0 0 15px rgba(0, 240, 255, 0.4),
        inset 0 0 20px rgba(0, 240, 255, 0.2);
    color: white;
    animation: glowPulse 3s infinite alternate;
}


@keyframes glowPulse {
    from {
        box-shadow:
            0 0 10px rgba(0, 132, 255, 0.3),
            inset 0 0 10px rgba(0, 128, 255, 0.2);
    }
    to {
        box-shadow:
            0 0 25px rgba(0, 102, 255, 0.8),
            inset 0 0 25px rgba(0, 94, 255, 0.6);

}

kbd {
    background: black;
    color: #005eff;
    border: 1px solid #0062ff;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 14px;
    text-shadow: 0 0 8px #0062ff;
}

.highlight {

}

.instructions-btn {

.instructions-btn:hover {

</style>
</head>

<body>

<div id="instructions"

</div>

    </div>

<div id="box" class="container mb-5">
    <h2>Fare Guide</h2>
<label>Pickup Location</label>
<select class="form-control" id="pickup">
               <option value="0">Choose a pickup location...</option>
                <option value="0">North Ave.</option>            <!-- start -->
                <option value="1.2">Quezon Ave.</option>        <!-- 0 + 1.2 km -->
                <option value="2.2">GMA-Kamuning</option>       <!-- + 1km -->
                <option value="4.1">Araneta Cubao</option>      <!-- + 1.9 km -->
                <option value="5.6">Santolan-Annapolis</option> <!-- + 1.5 km -->
                <option value="7.9">Ortigas</option>            <!-- + 2.3 km -->
                <option value="8.7">Shaw Blvd.</option>         <!-- + 0.8 km -->
                <option value="9.5">Boni</option>               <!-- + 0.8 km -->
                <option value="10.3">Guadalupe</option>         <!-- + 0.8 km -->
                <option value="11.1">Buendia</option>           <!-- + 0.8 km -->
                <option value="11.9">Ayala</option>             <!-- + 0.8 km -->
                <option value="12.7">Magallanes</option>        <!-- + 0.8 km -->
                <option value="13.5">Taft</option>              <!-- + 0.8 km -->
              </select>
            <br>
            <label>Dropoff Location</label>
            <select class="form-control" id="dropoff">
               <option value="0">Choose a pickup location...</option>
                <option value="0">North Ave.</option>            <!-- start -->
                <option value="1.2">Quezon Ave.</option>        <!-- 0 + 1.2 km -->
                <option value="2.2">GMA-Kamuning</option>       <!-- + 1km -->
                <option value="4.1">Araneta Cubao</option>      <!-- + 1.9 km -->
                <option value="5.6">Santolan-Annapolis</option> <!-- + 1.5 km -->
                <option value="7.9">Ortigas</option>            <!-- + 2.3 km -->
                <option value="8.7">Shaw Blvd.</option>         <!-- + 0.8 km -->
                <option value="9.5">Boni</option>               <!-- + 0.8 km -->
                <option value="10.3">Guadalupe</option>         <!-- + 0.8 km -->
                <option value="11.1">Buendia</option>           <!-- + 0.8 km -->
                <option value="11.9">Ayala</option>             <!-- + 0.8 km -->
                <option value="12.7">Magallanes</option>        <!-- + 0.8 km -->
                <option value="13.5">Taft</option>              <!-- + 0.8 km -->
              </select>
            <br>

            <input type="checkbox" id="disc"> <label>Apply 20% Discount For Students, Seniors, PWD</label>
<button type="submit" id="" class="btn btn-success" onclick="suna()">Compute</button>
</div>
<div class="footer">
<p>Ben Baldoria | 9 - Ruby 2026</p>
</div>

<script>
    function suna() {
    let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;
        pickup = parseFloat(document.getElementById("pickup").value);//to convert string values to numbers.
        dropoff = parseFloat(document.getElementById("dropoff").value);
        basefare = 50; //minimum fare which also include first 2KM
        perKMrate = 15; //cost per kilometer beyond 2KM
        baseKM = 2; //distance included in the base fare
        discount = document.getElementById("disc").checked; //when discount box is clicked, it's true and it behaves like 1

        // distance cannot be negative, same station handled as 0 distance
        distance = Math.max(Math.abs(dropoff - pickup), 0); //selects first value, but if negative, selects 0; it also gets absollute when changing stations to avoid negative values
        extraKM = Math.max(distance - baseKM, 0); //Calculates KM if it exceeds the base fare

        // fare calculation
    let fare = basefare + extraKM * perKMrate; //regular rate 

        // apply discount 
        fare = fare * (1 - 0.2 * discount);  //if discount box is clicked, it's false, and it behaves like 0

        // display
        window.alert("₱ " + fare.toFixed(2));
}
    </script>
