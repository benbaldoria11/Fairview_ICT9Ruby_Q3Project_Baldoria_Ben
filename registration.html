<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: 'Raleway', sans-serif;
    position: relative;
    overflow-x: hidden;

    background-image: url('https://i.pinimg.com/736x/cd/42/72/cd42724c88a06428e915be9ef1d7153c.jpg');

    background-repeat:no-repeat;
    background-size:cover;
}



.navbar {
    background: rgba(20, 40, 70, 0.6);
    backdrop-filter: blur(12px);
    padding: 12px 24px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);

    box-shadow:
        0 0 8px rgba(30, 146, 255, 0.4),
        0 0 20px rgba(30, 109, 255, 0.5);
}

.nav-logo {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 20px;
    transition: 0.3s ease;
}

.nav-logo:hover {
    transform: scale(1.1);

    box-shadow:
        0 0 10px rgba(30,139,255,0.9),
        0 0 25px rgba(30,139,255,0.7);
}

.nav-left {
    display: flex;
    align-items: center;
}

.nav-left a {
    margin-right: 18px;
    text-decoration: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    transition: 0.3s ease;
}

.nav-left a:hover {
    background: rgba(30,206,255,0.2);
    transform: scale(1.08);

    border: 1px solid #1ea5ff;

    box-shadow:
        0 0 8px rgba(30, 146, 255, 0.6),
        0 0 20px rgba(30, 109, 255, 0.8);
}

.nav-center {
    justify-self: center;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    color: white;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-self: end;
}

.nav-right a {
    color: white;
    text-decoration: none;
    transition: 0.3s ease;
}
.footer {
    background: linear-gradient(
        to top,
        rgba(20, 40, 70, 0.95),
        rgba(20, 40, 70, 0.75)
    );
    backdrop-filter: blur(15px);
    padding: 15px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 -5px 15px rgba(30, 128, 255, 0.6),
        0 -10px 30px rgba(30, 146, 255, 0.4);
    color: white;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.book-now:hover {
    text-shadow:
        0 0 8px rgba(30,139,255,0.9),
        0 0 15px rgba(30,139,255,0.8);
}

.nav-right .create-navbar {
    padding: 8px 14px;
    background: linear-gradient(135deg, #71b5f4, #64c6ff);
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s ease;
}

.nav-right .create-navbar:hover {
    transform: scale(1.08);

    box-shadow:
        0 0 10px rgba(30,139,255,0.9),
        0 0 25px rgba(30,139,255,0.7);
}

.container {
    width: 450px;
    background: rgba(20,40,70,0.4);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 
        0 0 12px rgba(30, 128, 255, 0.8),
        0 0 35px rgba(30, 146, 255, 0.9);
}

.profile-pic {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 15px;
    object-fit: cover;
}

input {
    width: 100%;
    max-width: 320px;
    padding: 10px;
    margin: 7px 0;
    border: none;
    border-radius: 5px;
    transition: all 0.3s ease;
}

input:hover, input:focus {
    box-shadow:
        0 0 8px rgba(30, 128, 255, 0.7),
        0 0 18px rgba(30, 146, 255, 0.6),
        0 0 28px rgba(30, 146, 255, 0.4);
    outline: none;
}

input[type="file"] {
    background: rgba(255,255,255,0.1);
    color: white;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
}

input[type="file"]::file-selector-button {
    background: #49739a;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    color: white;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
}

input[type="file"]::file-selector-button:hover {
    background-color:#d2e5ff;
    color: #1a4f6b;
    transform: scale(1.05);
    box-shadow:
        0 0 8px #64c6ff,
        0 0 16px #5eace8;
}

button {
    color: #1a4f6b;
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #8ecbec;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    font-family: 'Raleway', sans-serif;
    transition: all 0.3s ease;
}

.upload-btn {
    background: #71b5f4;
}

.upload-btn:hover {
    transform: scale(1.02);
    box-shadow:
        0 0 10px #488db5,
        0 0 20px #437ba6,
        0 0 35px rgba(19, 95, 167, 0.7);
}

.create {
    background: #71b5f4;
}

.cancel {
    background: #a0cdfe;
}

.create:hover {
    transform: scale(1.02);
    box-shadow:
        0 0 10px #488db5,
        0 0 20px #437ba6,
        0 0 35px rgba(19, 95, 167, 0.7);
}

.cancel:hover {
    background: #d2e5ff;
}

.checkbox {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 5px;
}

.checkbox input {
    width: auto;
    max-width: none;
    padding: 0;
    margin-right: 6px;
}

.checkbox input[type="checkbox"] {
    width: 16px;
    height: 16px;
    padding: 0;
    margin: 0;
    cursor: pointer;
}

.checkbox input[type="checkbox"]:hover,
.checkbox input[type="checkbox"]:checked {
    box-shadow:
        0 0 6px rgba(30,128,255,0.8),
        0 0 12px rgba(30,146,255,0.7);
}

.footer {
    background: linear-gradient(
        to top,
        rgba(20, 40, 70, 0.95),
        rgba(20, 40, 70, 0.75)
    );
    backdrop-filter: blur(15px);
    padding: 15px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.2);
    box-shadow:
        0 -5px 15px rgba(30, 128, 255, 0.6),
        0 -10px 30px rgba(30, 146, 255, 0.4);
    color: white;
    font-family: 'Raleway', sans-serif;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8);
}

.container,
.container h2,
.container label,
.container p {
    color: #ffffff;
}

.glow-title {
    text-shadow:
        0 0 8px rgba(30,116,255,0.6),
        0 0 18px rgba(30,113,255,0.8),
        0 0 30px rgba(30,128,255,0.5);
}

</style>
</head>

<body>

<div class="navbar">
    <div class="nav-left">
        <a href="home.html">Home</a>
        <a href="farematrix.html">Fare Matrix</a>
    </div>

    <div class="nav-center">
        RintarouFare PH
    </div>

    <div class="nav-right">
        <a href="registration.html" class="create-navbar">Create Account</a>
    </div>
</div>

<br><br>

<div class="container">

<h2 class="glow-title">Registration Form</h2>
<br>

<img id="preview"
src="https://i.pinimg.com/736x/ee/db/04/eedb04a3f302c69c680d9b98b9f2ca45.jpg"
class="profile-pic">

<input type="file" id="photoInput" accept="image/*">
<button type="button" class="upload-btn" onclick="uploadPhoto()">Upload Photo</button>

<form id="regForm">
<input type="text" id="fname" placeholder="First Name">
<input type="text" id="lname" placeholder="Last Name">
<input type="number" id="age" placeholder="Age">
<input type="number" id="contact" placeholder="Contact Number">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">

<div class="form-check mt-2 text-start">
    <input class="form-check-input" type="checkbox" id="terms">
    <label class="form-check-label" for="terms">
        I agree to Terms & Conditions
    </label>
</div>

<button type="submit" class="create">Create Account</button>
<button type="button" class="cancel" onclick="clearForm()">Cancel</button>
</form>
</div>

<div style="height:60px;"></div>

<div class="footer">
<p>Ben Baldoria | 9 - Ruby 2026</p>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", function(e){
e.preventDefault();

let fname = document.getElementById("fname").value;
let lname = document.getElementById("lname").value;
let age = document.getElementById("age").value;
let email = document.getElementById("email").value;
let terms = document.getElementById("terms").checked;

if(fname=="" || lname=="" || age=="" || email==""){
alert("Please fill in all fields!");
}
else if(!terms){
alert("Please agree to the Terms & Conditions.");
}
else{
alert("Registration Successful!");
window.location.href="confirmation.html";
}
});

function clearForm(){
document.getElementById("regForm").reset();
document.getElementById("preview").src =
"https://static.vecteezy.com/system/resources/thumbnails/009/292/244/small/default-avatar-icon-of-social-media-user-vector.jpg";
}

function uploadPhoto() {
let input = document.getElementById("photoInput");
let preview = document.getElementById("preview");

if (input.files && input.files[0]) {
let reader = new FileReader();
reader.onload = function(e) {
preview.src = e.target.result;
}
reader.readAsDataURL(input.files[0]);
alert("Profile picture uploaded successfully!");
}
}
</script>

</body>
</html>
